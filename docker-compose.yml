services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: metricaapp-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      SA_PASSWORD: "${SA_PASSWORD:-StrongPassword!123}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: ./Backend/OrdersApp
      dockerfile: Dockerfile
    container_name: metricaapp-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__OrdersAppDatabase: "Server=db,1433;Database=PedidosDB;User Id=sa;Password=${SA_PASSWORD:-StrongPassword!123};TrustServerCertificate=True;"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "7203:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:7203"
    container_name: metricaapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mssql_data:
